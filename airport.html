<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>airport</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b1220">
<style>
  :root{
    --bg:#0b1220; --bg2:#0e1729; --panel:#141f33; --panel2:#1b2a44; --rule:#26385a;
    --ink:#e3ecf7; --muted:#8fa5c0; --dim:#54688a;
    --hot:#4fe3a8; --run:#ffc46b; --bad:#ff6b5e; --accent:#e8a13c; --new:#b78cff;
    --you:#4aa3ff; --ai:#e8a13c; --tool:#54688a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none}
  body{
    background:
      radial-gradient(1100px 500px at 75% -10%, rgba(232,161,60,.07), transparent 60%),
      radial-gradient(900px 500px at 5% 110%, rgba(74,163,255,.06), transparent 60%),
      linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--ink);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header{
    flex:0 0 auto; padding:10px 14px; display:flex; gap:10px; align-items:center;
    border-bottom:1px solid var(--rule); -webkit-user-select:none; user-select:none;
  }
  header b{ font-size:14px; letter-spacing:.06em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  header .sub{ color:var(--dim); font-size:10px; font-family:ui-monospace,Menlo,monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
  header button{
    background:transparent; border:1px solid var(--rule); color:var(--muted);
    border-radius:8px; padding:4px 10px; font-size:13px; cursor:pointer; flex:0 0 auto;
    -webkit-tap-highlight-color:transparent;
  }
  header .stat{ font-size:10px; color:var(--muted); font-family:ui-monospace,Menlo,monospace; display:flex; align-items:center; gap:5px; flex:0 0 auto; }
  header #gauge:empty + .stat{ margin-left:auto; }
  header .stat .dot{ width:7px; height:7px; border-radius:50%; background:var(--dim); }
  header .stat.ok .dot{ background:var(--hot); }
  header .stat.warn .dot{ background:var(--run); animation:pulse 1.1s infinite; }
  header .stat.bad .dot{ background:var(--bad); }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }

  /* ---------- the tarmac — non-scrolling; the APRON is a square and EVERYTHING
     on it is sized as a fraction of the square's side (--S), so the field looks
     spatially IDENTICAL on a phone and a desktop — same places, same relative
     sizes, just bigger. That's the spatial-memory contract. ---------- */
  #tarmac{ flex:1 1 auto; position:relative; overflow:hidden; touch-action:none; display:none; }
  #tarmac.on{ display:block; }
  #apron{ position:absolute; border:calc(var(--S,300px)*0.006) dashed var(--rule); border-radius:calc(var(--S,300px)*0.035); }
  .plane{
    position:absolute; width:calc(var(--S)*0.22); transform:translateX(-50%); text-align:center; cursor:pointer;
    -webkit-user-select:none; user-select:none; touch-action:none; -webkit-tap-highlight-color:transparent;
  }
  .plane .disc{
    width:calc(var(--S)*0.125); height:calc(var(--S)*0.125); margin:0 auto; border-radius:24%;
    background:var(--panel); border:calc(var(--S)*0.005) solid var(--rule);
    display:flex; align-items:center; justify-content:center; font-size:calc(var(--S)*0.062);
    position:relative; transition:border-color .2s, box-shadow .2s;
  }
  .plane.hot .disc{ border-color:var(--hot); box-shadow:0 0 calc(var(--S)*0.03) rgba(79,227,168,.3); }
  .plane.running .disc{ border-color:var(--run); box-shadow:0 0 calc(var(--S)*0.035) rgba(255,196,107,.45); animation:pulse 1.1s infinite; }
  .plane.offline{ opacity:.45; }
  .plane.dragging .disc{ box-shadow:0 calc(var(--S)*0.015) calc(var(--S)*0.05) rgba(0,0,0,.6); }
  .plane .unread{
    position:absolute; top:calc(var(--S)*-0.012); right:calc(var(--S)*-0.012);
    width:calc(var(--S)*0.03); height:calc(var(--S)*0.03); border-radius:50%;
    background:var(--new); border:calc(var(--S)*0.005) solid var(--bg); box-shadow:0 0 calc(var(--S)*0.025) rgba(183,140,255,.7);
  }
  .plane .name{
    margin-top:calc(var(--S)*0.008); font-size:calc(var(--S)*0.024); font-weight:600; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .plane .meta{ font-size:calc(var(--S)*0.018); color:var(--dim); font-family:ui-monospace,Menlo,monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .plane .meta .hostm{ color:var(--muted); }
  .plane .meta .hostm.off{ color:var(--bad); }
  .plane .meta .hotm{ color:var(--hot); }
  .plane .meta .runm{ color:var(--run); }
  #addplane{
    position:absolute; right:calc(var(--S)*0.02); bottom:calc(var(--S)*0.02);
    width:calc(var(--S)*0.09); height:calc(var(--S)*0.09);
    border-radius:50%; border:calc(var(--S)*0.004) solid var(--accent);
    background:linear-gradient(180deg,#3a2c12,#22190a);
    color:var(--accent); font-size:calc(var(--S)*0.05); cursor:pointer; -webkit-tap-highlight-color:transparent;
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .emptytarmac{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:13px; pointer-events:none; }
  /* allowance gauge — lives in the header bar, one span per account */
  #gauge{
    margin-left:auto; display:flex; gap:9px; align-items:center; flex:0 0 auto;
    font:9.5px ui-monospace,Menlo,monospace; color:var(--dim);
  }
  #gauge:empty{ display:none; }
  #gauge .acct{ white-space:nowrap; }
  #gauge .ok{ color:var(--hot); } #gauge .warn{ color:var(--run); } #gauge .bad{ color:var(--bad); }
  #gauge .lbl{ color:var(--muted); }
  #gauge .stale{ opacity:.5; }

  /* ---------- 3-column session view (explorer | file | claude) ---------- */
  #cols{ flex:1 1 auto; min-height:0; display:none; }
  #cols.on{ display:flex; }
  #claudecol{ flex:1 1 0; min-width:0; display:flex; flex-direction:column; }
  #explorer, #fileview{ display:none; }
  #cols.wide #explorer{
    display:block; flex:0 0 235px; overflow-y:auto; padding:8px 6px;
    border-right:1px solid var(--rule); font:12px ui-monospace,Menlo,monospace;
    -webkit-user-select:none; user-select:none;
  }
  #cols.wide #fileview{ display:flex; flex-direction:column; flex:1.15 1 0; min-width:0; border-right:1px solid var(--rule); }
  .exphead{ display:flex; align-items:center; gap:6px; padding:2px 6px 8px; color:var(--dim); font-size:10px; letter-spacing:.06em; text-transform:uppercase; }
  .exphead button{ margin-left:auto; background:transparent; border:1px solid var(--rule); color:var(--muted); border-radius:6px; padding:1px 7px; font-size:11px; cursor:pointer; }
  .fent{ display:flex; align-items:center; gap:5px; padding:3px 6px; border-radius:6px; cursor:pointer; white-space:nowrap; color:var(--muted); }
  .fent:hover{ background:var(--panel2); }
  .fent.sel{ background:var(--panel2); color:var(--ink); box-shadow:inset 2px 0 0 var(--accent); }
  .fent .arrow{ width:10px; flex:0 0 auto; color:var(--dim); }
  .fent .fname{ overflow:hidden; text-overflow:ellipsis; }
  .fent .fsize{ margin-left:auto; color:var(--dim); font-size:10px; }
  .fent.dir .fname{ color:var(--ink); }
  .expempty{ color:var(--dim); padding:6px; font-size:11px; }
  .fvhead{ flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--rule);
    font:11px ui-monospace,Menlo,monospace; color:var(--muted); }
  .fvhead .fvpath{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink); }
  .fvhead .fvsize{ color:var(--dim); flex:0 0 auto; }
  .fvhead button{ flex:0 0 auto; background:transparent; border:1px solid var(--rule); color:var(--dim); border-radius:6px; padding:1px 7px; font-size:10px; font-family:inherit; cursor:pointer; }
  .fvbody{ flex:1 1 auto; min-height:0; overflow:auto; padding:12px; }
  .fvbody:has(> iframe){ padding:0; }
  .fvpre{ margin:0; font:12px/1.5 ui-monospace,Menlo,monospace; white-space:pre; color:var(--ink); }
  .fvbody.fvedit{ padding:0; overflow:hidden; position:relative; }
  .fveditor{ position:absolute; inset:0; color:var(--dim); font:11px ui-monospace,Menlo,monospace; }
  .fvhead button.dirty{ border-color:var(--run); color:var(--run); }
  .fvframe{ width:100%; height:100%; border:none; background:#fff; display:block; }
  .fvimg{ max-width:100%; }
  .fvnote{ color:var(--dim); font-size:12px; padding:20px 0; text-align:center; }

  /* ---------- overlay (create / server / gate) ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:flex; align-items:center; justify-content:center; padding:18px; }
  .sheet{ background:var(--panel); border:1px solid var(--rule); border-radius:16px; padding:16px; width:min(420px,100%); max-height:85vh; overflow-y:auto; }
  .sheet h3{ margin:0 0 12px; font-size:15px; }
  .sheet label{ display:block; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); margin:10px 0 4px; }
  .sheet input, .sheet select, .sheet textarea{
    width:100%; background:var(--panel2); border:1px solid var(--rule); border-radius:8px;
    color:var(--ink); padding:9px 10px; font:14px -apple-system,system-ui,sans-serif;
  }
  .sheet textarea{ min-height:90px; resize:vertical; font-size:13px; line-height:1.4; }
  .sheet input:focus, .sheet select:focus, .sheet textarea:focus{ outline:none; border-color:var(--accent); }
  .sheet .btns{ display:flex; gap:8px; margin-top:14px; }
  .sheet .btns button{
    flex:1; border-radius:8px; padding:10px; cursor:pointer; font:600 13px -apple-system,sans-serif;
    background:transparent; border:1px solid var(--rule); color:var(--muted); -webkit-tap-highlight-color:transparent;
  }
  .sheet .btns button.go{ background:linear-gradient(180deg,#3a2c12,#22190a); border-color:var(--accent); color:var(--ink); flex:2; }
  .sheet .btns button.danger{ border-color:var(--bad); color:var(--bad); }
  .sheet .hint{ color:var(--dim); font-size:10px; font-family:ui-monospace,Menlo,monospace; margin-top:8px; min-height:12px; }
  .sheet .hostrow{ display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; }
  .sheet .hostrow span{ flex:1; overflow:hidden; text-overflow:ellipsis; }
  .sheet .hostrow span .off{ color:var(--dim); }
  .sheet .hostrow input{ width:74px; flex:0 0 auto; text-align:center; }
  .gate{ text-align:center; }
  .gate .big{ font-size:34px; margin-bottom:6px; }
  .gate p{ color:var(--muted); font-size:12.5px; }

  /* ---------- session feed ---------- */
  #feed{ flex:1 1 auto; min-height:0; overflow-y:auto; padding:12px; display:none; }
  #feed.on{ display:block; }
  #jumps{ position:relative; height:0; z-index:6; }
  #jumps button{
    position:absolute; bottom:10px; width:34px; height:34px; border-radius:50%;
    border:1px solid var(--rule); background:var(--panel2); color:var(--accent);
    font:16px/32px ui-monospace,Menlo,monospace; text-align:center; padding:0; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.5); display:none; opacity:.92; -webkit-tap-highlight-color:transparent;
  }
  #jumps button.on{ display:block; }
  #jumps button:hover{ background:var(--panel); color:var(--ink); }
  #jumpbot{ right:14px; }
  #jumptop{ right:56px; }
  #fold{ right:98px; }
  .turn{
    background:var(--panel); border:1px solid var(--rule); border-radius:12px;
    padding:8px 11px; margin-bottom:8px; max-width:820px;
  }
  .turn .row1{ display:flex; align-items:baseline; gap:7px; flex-wrap:wrap; }
  .turn .who{ font-size:10px; letter-spacing:.06em; text-transform:uppercase; font-weight:700; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .chip{
    display:inline-flex; align-items:center; height:22px; padding:0 8px; margin:0 5px 6px 0;
    border-radius:6px; border:1px solid var(--rule); background:var(--panel2); color:var(--muted);
    font:11px ui-monospace,Menlo,monospace; cursor:pointer; vertical-align:middle;
    max-width:46vw; overflow:hidden; white-space:nowrap; -webkit-tap-highlight-color:transparent;
  }
  .chip:hover{ filter:brightness(1.4); }
  .chip.tool{ color:var(--tool); }
  .chip.ai{ color:var(--ai); border-color:rgba(232,161,60,.35); }
  .chip.user{ color:var(--you); border-color:rgba(74,163,255,.35); }
  .chip.err{ color:var(--bad); border-color:rgba(255,107,94,.4); }
  .turn .when{ color:var(--dim); font-size:10px; font-family:ui-monospace,Menlo,monospace; cursor:pointer; }
  .turn .grow{ flex:1; }
  .turn .bbtn{
    background:transparent; border:1px solid var(--rule); color:var(--dim); font-size:10px;
    font-family:ui-monospace,Menlo,monospace; border-radius:6px; padding:1px 7px; cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .turn .bbtn.forced{ color:var(--accent); border-color:var(--accent); }
  .turn .bbtn.danger{ color:var(--bad); border-color:rgba(255,107,94,.4); }
  .turn .text{ font-size:15px; margin-top:4px; word-wrap:break-word; white-space:pre-wrap; }
  .turn.you{ border-left:3px solid var(--you); } .turn.you .who{ color:var(--you); }
  .turn.ai{ border-left:3px solid var(--ai); background:linear-gradient(180deg, rgba(232,161,60,.05), transparent 70%), var(--panel); }
  .turn.ai .who{ color:var(--ai); }
  .turn.tool{ border-left:3px solid var(--tool); opacity:.8; }
  .turn.tool .who{ color:var(--tool); }
  .turn.tool .text{ font-size:12px; font-family:ui-monospace,Menlo,monospace; color:var(--muted); }
  .turn.err{ border-color:var(--bad); } .turn.err .text{ color:var(--bad); }
  .turn .statline{
    margin-top:5px; font-size:10px; color:var(--dim); font-family:ui-monospace,Menlo,monospace;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .turn .statline .cr{ color:var(--hot); } .turn .statline .cw{ color:var(--run); }
  .turn textarea.editbox{
    width:100%; background:var(--panel2); border:1px solid var(--accent); border-radius:8px;
    color:var(--ink); font:14px/1.4 -apple-system,system-ui,sans-serif; padding:8px; margin-top:6px;
    min-height:70px; resize:vertical;
  }
  .confirmrow{ display:flex; gap:6px; margin-top:6px; }
  .thinking{ display:flex; gap:5px; padding:10px 4px; }
  .thinking span{ width:7px; height:7px; border-radius:50%; background:var(--run); animation:pulse 1s infinite; }
  .thinking span:nth-child(2){ animation-delay:.2s } .thinking span:nth-child(3){ animation-delay:.4s }
  .emptyfeed{ color:var(--dim); text-align:center; padding:50px 0; }

  /* ---------- inline session settings (top of feed) ---------- */
  .cfg{ background:var(--panel); border:1px solid var(--rule); border-radius:12px; padding:10px 12px 12px; margin-bottom:12px; max-width:820px; }
  .cfg .cfghead{ font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  .cfg label{ display:block; font-size:9px; letter-spacing:.06em; text-transform:uppercase; color:var(--dim); margin:8px 0 3px; }
  .cfg label .warn{ color:var(--run); text-transform:none; letter-spacing:0; }
  .cfg input, .cfg select, .cfg textarea{
    width:100%; background:var(--panel2); border:1px solid var(--rule); border-radius:8px;
    color:var(--ink); padding:7px 9px; font:13px -apple-system,system-ui,sans-serif;
  }
  .cfg textarea{ min-height:70px; resize:vertical; line-height:1.4; }
  .cfg input:focus, .cfg select:focus, .cfg textarea:focus{ outline:none; border-color:var(--accent); }
  .cfg .row{ display:flex; gap:8px; } .cfg .row > div{ flex:1; min-width:0; }
  .cfg .ckrow{ display:flex; gap:14px; flex-wrap:wrap; margin-top:2px; }
  .cfg label.ck{
    display:flex; align-items:center; gap:6px; margin:4px 0 0; cursor:pointer;
    font:12.5px -apple-system,system-ui,sans-serif; color:var(--ink); text-transform:none; letter-spacing:0;
  }
  .cfg label.ck input{ width:auto; accent-color:var(--accent); margin:0; }
  .cfg label.ck span{ color:var(--dim); font-size:10px; }
  .cfg .btns{ display:flex; gap:8px; margin-top:12px; }
  .cfg .btns button{
    flex:1; border-radius:8px; padding:8px; cursor:pointer; font:600 12px -apple-system,sans-serif;
    background:transparent; border:1px solid var(--rule); color:var(--muted); -webkit-tap-highlight-color:transparent;
  }
  .cfg .btns button.danger{ border-color:var(--bad); color:var(--bad); }
  .cfg .hint{ color:var(--dim); font-size:9px; font-family:ui-monospace,Menlo,monospace; margin-top:7px; min-height:10px; }

  /* markdown rendering */
  .text.md{ white-space:normal; }
  .text.md > :first-child{ margin-top:0 } .text.md > :last-child{ margin-bottom:0 }
  .text.md p{ margin:.45em 0; }
  .text.md h1,.text.md h2,.text.md h3,.text.md h4{ margin:.7em 0 .3em; line-height:1.25; }
  .text.md h1{ font-size:1.25em } .text.md h2{ font-size:1.15em } .text.md h3{ font-size:1.05em } .text.md h4{ font-size:1em }
  .text.md code{ background:var(--panel2); border:1px solid var(--rule); padding:0 5px; border-radius:5px; font-size:.88em; font-family:ui-monospace,Menlo,monospace; }
  .text.md pre{ background:var(--bg2); border:1px solid var(--rule); padding:8px 10px; border-radius:8px; overflow-x:auto; font-size:12.5px; line-height:1.4; margin:.5em 0; }
  .text.md pre code{ background:none; border:none; padding:0; font-size:inherit; }
  .text.md ul,.text.md ol{ margin:.4em 0; padding-left:1.4em; }
  .text.md li{ margin:.15em 0; }
  .text.md blockquote{ margin:.45em 0; padding:1px 10px; border-left:3px solid var(--rule); color:var(--muted); }
  .text.md a{ color:var(--accent); }
  .text.md hr{ border:none; border-top:1px solid var(--rule); margin:.8em 0; }
  .text.md table{ border-collapse:collapse; margin:.5em 0; font-size:13px; display:block; overflow-x:auto; max-width:100%; }
  .text.md th,.text.md td{ border:1px solid var(--rule); padding:4px 9px; text-align:left; }
  .text.md th{ background:var(--panel2); }
  .htmlframe{ width:100%; height:min(430px,55vh); border:1px solid var(--rule); border-radius:8px; background:#fff; margin-top:4px; }

  /* ---------- composer ---------- */
  footer{
    flex:0 0 auto; padding:8px 10px calc(10px + env(safe-area-inset-bottom));
    border-top:1px solid var(--rule); background:rgba(0,0,0,.25); display:none;
  }
  footer.on{ display:block; }
  .interim{ color:var(--run); font-size:13px; font-style:italic; padding:0 4px 6px; word-wrap:break-word; }
  .interim:empty{ padding:0; }
  #box{
    width:100%; background:var(--panel); border:1px solid var(--rule); border-radius:12px;
    color:var(--ink); font:15px/1.45 -apple-system,system-ui,sans-serif;
    padding:9px 12px; resize:none; min-height:46px; max-height:30vh; overflow-y:auto;
  }
  #box:focus{ outline:none; border-color:var(--accent); }
  .deadman{
    position:relative; height:32px; border-radius:10px; margin-top:8px;
    background:linear-gradient(90deg, rgba(255,107,94,.25) 0%, rgba(255,107,94,.12) 38%, rgba(79,227,168,.10) 42%, rgba(79,227,168,.22) 100%);
    border:1px solid var(--rule); overflow:hidden; display:none;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
  }
  .deadman.on{ display:block; }
  .deadman .dm-fill{ position:absolute; inset:0 auto 0 0; width:100%; background:linear-gradient(90deg, rgba(255,196,107,.28), rgba(255,196,107,.10)); transition:width .18s linear; }
  .deadman .dm-knob{ position:absolute; top:2px; bottom:2px; width:12px; border-radius:6px; background:var(--run); box-shadow:0 0 8px rgba(255,196,107,.8); transition:left .18s linear; }
  .deadman .dm-txt{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font:11px ui-monospace,Menlo,monospace; color:var(--ink); letter-spacing:.04em; text-shadow:0 1px 2px rgba(0,0,0,.7); pointer-events:none; }
  .controls{ display:flex; gap:7px; margin-top:8px; -webkit-user-select:none; user-select:none; }
  .controls button{
    -webkit-tap-highlight-color:transparent; cursor:pointer;
    border-radius:12px; border:1px solid var(--rule); background:var(--panel);
    color:var(--ink); font:600 12px -apple-system,sans-serif; padding:10px 6px;
  }
  #dictate,#whisper{ flex:1; }
  #brief{ flex:.45; }
  #addbox{ flex:.8; }
  #dictate.on{ border-color:var(--run); background:linear-gradient(180deg,#3a2d10 0%,#241a08 100%); color:var(--run); }
  #whisper.on{ border-color:var(--bad); background:linear-gradient(180deg,#4a1a14 0%,#2a0e0a 100%); color:#ff9c8a; }
  #whisper.busy{ border-color:var(--run); color:var(--run); }
  #runbtn{ flex:1.1; background:linear-gradient(180deg,#3a2c12 0%,#22190a 100%); border-color:var(--accent); }
  #runbtn.stop{ background:linear-gradient(180deg,#4a1a14 0%,#2a0e0a 100%); border-color:var(--bad); color:#ff9c8a; }
  #runbtn:disabled{ opacity:.4; }

<script>
// WATCHDOG — deliberately its own <script> block: a syntax error in the main
// script below kills that whole block INCLUDING its self-reload — but not this
// one. Polls /pagever; when the file on disk is fixed, every stranded page
// reloads itself within ~4s. (corral lineage, lived 2026-07-14)
(function () {
  var MYVER = "__PAGE_VER__"; // stamped at serve time
  if (MYVER.indexOf("__") === 0) return; // opened as file:// — no stamp, no watchdog
  var base;
  try { base = localStorage.getItem("airportUrl_v1") || (location.protocol.indexOf("http") === 0 ? location.origin : null); } catch (_) {}
  if (!base) return;
  setInterval(function () {
    if (Date.now() - (window.__airportMainAlive || 0) < 12000) return; // main script alive — it owns reloads
    fetch(base + "/pagever").then(function (r) { return r.json(); }).then(function (j) {
      if (!j.v || j.v === MYVER) return;
      var last = 0;
      try { last = +sessionStorage.getItem("airportWatchdog_v1") || 0; } catch (_) {}
      if (Date.now() - last < 15000) return; // loop guard: never reload-storm
      try { sessionStorage.setItem("airportWatchdog_v1", String(Date.now())); } catch (_) {}
      location.reload();
    }).catch(function () {});
  }, 4000);
})();
</script>
<script>
// ---------- shelf (verbatim — github.com/dglittle/shelf) ----------
function shelf_merge(shelf, incoming) {
    if (!(incoming instanceof Array)) incoming = [incoming, null]
    let [val, ver, change] = merge(shelf[0], shelf[1], incoming[0], incoming[1])
    shelf[0] = val
    shelf[1] = ver
    return change

    function is_obj(o) { return o && typeof o == 'object' && !Array.isArray(o) }
    function ver_num(x) { return (x instanceof Array) ? x[0] : x }

    function make_ver(val) {
        let x = {}
        for (let [k, v] of Object.entries(val))
            x[k] = is_obj(v) ? [1, make_ver(v)] : 1
        return x
    }

    function merge(a_val, a_ver, b_val, b_ver) {
        if (b_ver == null) {
            if (!is_obj(a_val) || !is_obj(b_val)) {
                if (a_val == b_val) return [a_val, a_ver, null]
                b_ver = (a_ver ? ver_num(a_ver) : 0) + 1
                if (is_obj(b_val)) b_ver = [b_ver, make_ver(b_val)]
                return [b_val, b_ver, [b_val, b_ver]]
            }
        } else {
            let c = (a_ver != null) ? (ver_num(a_ver) - ver_num(b_ver)) : -1
            if (c > 0) return [a_val, a_ver, null]
            if (c < 0) return [b_val, b_ver, [b_val, b_ver]]
        }

        if (is_obj(a_val) && is_obj(b_val)) {
            let change = null
            for (let key of Object.keys(a_ver[1])) {
                if ((!b_ver && b_val[key] !== undefined) || b_ver?.[1][key] != null) {
                    let [val, ver, c] = merge(a_val[key], a_ver[1][key], b_val[key], b_ver?.[1][key])
                    if (val != null) a_val[key] = val
                    else delete a_val[key]
                    a_ver[1][key] = ver
                    if (c) {
                        if (!change) change = [{}, [ver_num(a_ver), {}]]
                        change[0][key] = c[0]
                        change[1][1][key] = c[1]
                    }
                }
            }
            for (let key of Object.keys(b_val)) {
                if (a_ver[1][key] == null) {
                    let [val, ver, c] = merge(null, null, b_val[key], b_ver?.[1][key])
                    if (val != null) a_val[key] = val
                    else delete a_val[key]
                    if (ver != null) a_ver[1][key] = ver
                    if (c) {
                        if (!change) change = [{}, [ver_num(a_ver), {}]]
                        change[0][key] = c[0]
                        change[1][1][key] = c[1]
                    }
                }
            }
            return [a_val, a_ver, change]
        } else if (JSON.stringify(a_val) >= JSON.stringify(b_val)) {
            return [a_val, a_ver, null]
        } else {
            return [b_val, b_ver, [b_val, b_ver]]
        }
    }
}

// ---------- state ----------
const LS_URL = "airportUrl_v1";
const LS_PASS = "airportPass_v1";
const PAGE_VER = "__PAGE_VER__"; // stamped by the tower at serve time
const LS_PLACE = "airportPlace_v1"; // where-was-I: open plane + open file per plane
let placeRestored = false;  // restore only on the FIRST doc — reconnects must not yank the user around
function place(){ try { return JSON.parse(localStorage.getItem(LS_PLACE)) || {}; } catch (_) { return {}; } }
function placePut(fn){ const p = place(); fn(p); try { localStorage.setItem(LS_PLACE, JSON.stringify(p)); } catch (_) {} }
let BASE = localStorage.getItem(LS_URL) ||
  (location.protocol.startsWith("http") ? location.origin : "");
let doc = [null, null];
let ws = null, gated = false, reconnectDelay = 1500;
let view = null;              // null = tarmac, else session id
let editing = null;           // box key being edited
let confirming = null;        // box key with delete-confirm open
const fmtOverride = {};       // `${session}:${key}` -> forced fmt
const fsReqs = new Map();     // reqId -> resolve

const $ = (id) => document.getElementById(id);
const tarmacEl = $("tarmac"), feedEl = $("feed"), composer = $("composer"), colsEl = $("cols");

function esc(x){ const d = document.createElement("div"); d.textContent = x == null ? "" : String(x); return d.innerHTML; }
function setStat(k, m){ $("stat").className = "stat " + k; $("stat-txt").textContent = m; }
function sessions(){ return (doc[0] && doc[0].sessions) || {}; }
function hosts(){ return (doc[0] && doc[0].hosts) || {}; }
function sess(id){ return sessions()[id] || {}; }
function hostUp(name){ return !!(hosts()[name] || {}).online; }
function boxesOf(s){ return Object.keys(s.messages || {}).sort().map(k => ({ key: k, ...s.messages[k] })); }
function fmtTok(n){ if (!n) return "–"; if (n >= 1e6) return (n/1e6).toFixed(1)+"M"; if (n >= 1e3) return Math.round(n/1e3)+"k"; return String(n); }
function fmtDur(ms){ const s = ms/1000; if (s < 60) return s.toFixed(1)+"s"; const m = Math.floor(s/60); return m+"m "+Math.round(s%60)+"s"; }
function fmtT(ts){ return ts ? new Date(ts).toLocaleTimeString([], {hour12:false}) : ""; }
function ago(ts){
  if (!ts) return "";
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 60) return s+"s"; if (s < 3600) return Math.floor(s/60)+"m";
  if (s < 86400) return Math.floor(s/3600)+"h"; return Math.floor(s/86400)+"d";
}
function isHot(s){ return s.hotUntil && Date.now() < s.hotUntil; }
function isUnread(s){ return !s.running && s.lastRunEndedAt && s.lastRunEndedAt > (s.seenAt || 0); }
function hint(t){ $("hintline").textContent = t || ""; }
const PLANES = ["🛩","✈️","🛫","🛬","🚁","🛸","🚀","🎈"];
function emojiFor(id, s){ if (s.emoji) return s.emoji; let h = 0; for (const c of id) h = (h * 31 + c.charCodeAt(0)) >>> 0; return PLANES[h % PLANES.length]; }
const MODELS = ["claude-fable-5","claude-opus-4-8","claude-sonnet-5","claude-haiku-4-5"];

// ---------- sync (WS to the tower) ----------
function send(obj){ if (ws && ws.readyState === 1) { try { ws.send(JSON.stringify(obj)); } catch (_) {} } }
function patch(p){
  shelf_merge(doc, p);
  render();
  send({ type: "update", patch: p });
}
function wsUrl(){ return BASE.replace(/^http/, "ws"); }
function connect(){
  if (!BASE) { serverSheet(); return; }
  if (ws) { try { ws.onclose = null; ws.close(); } catch(_){} }
  setStat("warn", "connecting…");
  ws = new WebSocket(wsUrl());
  ws.onopen = () => { send({ type: "auth", role: "browser", pass: localStorage.getItem(LS_PASS) || "" }); };
  ws.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch(_) { return; }
    if (m.type === "doc") {
      reconnectDelay = 1500;
      doc = m.doc; setStat("ok", "live"); render(); checkPageVer();
      if (!placeRestored) {
        placeRestored = true;
        const pn = place().plane;
        if (!view && pn && sessions()[pn]) openSession(pn);
      }
      return;
    }
    if (m.type === "delta") { shelf_merge(doc, m.delta); render(); checkPageVer(); return; }
    if (m.type === "auth-failed") { gated = true; try { ws.close(); } catch(_){} renderGate(); return; }
    if (m.type === "run-failed") { hint("✗ " + (m.error || "run failed")); render(); return; }
    if (m.type === "fs-res") { const cb = fsReqs.get(m.reqId); fsReqs.delete(m.reqId); if (cb) cb(m); return; }
  };
  ws.onclose = () => {
    if (gated) return;
    setStat("bad", "reconnecting…");
    setTimeout(connect, reconnectDelay = Math.min(15000, reconnectDelay * 1.5));
  };
  ws.onerror = () => { try { ws.close(); } catch (_) {} };
}
setInterval(() => send({ type: "ping" }), 30000);
setInterval(() => { if (!doc[0]) return; renderGauge(); if (!view) renderTarmac(); }, 30000); // ago/gauge refresh

// page self-reload: the shelf carries pageVersion = hash of airport.html on the
// tower's disk; when it stops matching the stamp in THIS page, pull the new one.
function checkPageVer(){
  window.__airportMainAlive = Date.now(); // heartbeat: tells the watchdog block the main script is alive
  const v = doc[0] && doc[0].pageVersion;
  if (!v || PAGE_VER.startsWith("__") || v === PAGE_VER) return;
  if (mode || editing || fvDirty()) return;       // don't yank a recording, box edit, or unsaved file edit
  if (sessionStorage.getItem("airportReloadedTo") === v) return; // loop guard if a cache serves stale
  sessionStorage.setItem("airportReloadedTo", v);
  location.reload();
}
setInterval(checkPageVer, 5000);

// ---------- header / views ----------
$("back").addEventListener("click", () => closeSession());
$("gear").addEventListener("click", () => serverSheet());

function openSession(id){
  view = id; editing = null; confirming = null;
  placePut(p => { p.plane = id; });
  patch({ sessions: { [id]: { seenAt: Date.now() } } });
  loadDraft(id);
  render();
  const rel = (place().files || {})[id];
  if (rel && !expState().sel) openFile(rel, (place().edits || {})[id]);
  setTimeout(() => { feedEl.scrollTop = feedEl.scrollHeight; }, 0);
}
function closeSession(){
  if (view && exp[view] && exp[view].editing && !closeEditor()) return;  // unsaved file edit — user kept it
  placePut(p => { p.plane = null; });
  if (view) patch({ sessions: { [view]: { seenAt: Date.now() } } });
  stopModeSafe();
  view = null; render();
}

function render(){
  if (view && !sessions()[view]) view = null; // deleted under us
  renderGauge();
  view ? renderSession() : renderTarmac();
}

// ---------- allowance gauge (per subscription account; tower polls the headers) ----------
const CIRC = ["", "①", "②", "③"];
function untilTxt(ms){
  if (!ms) return "";
  const s = Math.max(0, Math.floor((ms - Date.now()) / 1000));
  if (s < 3600) return Math.ceil(s / 60) + "m";
  return Math.floor(s / 3600) + "h" + Math.round((s % 3600) / 60) + "m";
}
function sevCls(x){ return x >= 0.85 ? "bad" : x >= 0.6 ? "warn" : "ok"; }
function gaugeBar(x){ const n = Math.max(0, Math.min(8, Math.round((x || 0) * 8))); return "▮".repeat(n) + "▯".repeat(8 - n); }
function renderGauge(){
  const g = $("gauge");
  const u = (doc[0] && doc[0].usage) || {};
  const keys = Object.keys(u).sort();
  if (!keys.length) { g.innerHTML = ""; g.title = ""; return; }
  const spans = [], tips = [];
  for (const k of keys) {
    const a = u[k] || {};
    const tag = CIRC[+k] || k;
    if (a.err) { spans.push(`<span class="acct stale">${tag}<span class="bad">✗</span></span>`); tips.push(`${tag} ${a.err}`); continue; }
    const stale = !a.at || Date.now() - a.at > 25 * 60_000;
    spans.push(`<span class="acct${stale ? " stale" : ""}">${tag}<span class="${sevCls(a.five)}">${gaugeBar(a.five)}${Math.round((a.five || 0) * 100)}%</span>${a.seven >= 0.5 ? ` <span class="${sevCls(a.seven)}">7d${Math.round(a.seven * 100)}%</span>` : ""}</span>`);
    tips.push(`${tag} 5h ${Math.round((a.five || 0) * 100)}% (resets ${untilTxt(a.fiveReset)}) · 7d ${Math.round((a.seven || 0) * 100)}% (resets ${untilTxt(a.sevenReset)})`);
  }
  g.innerHTML = spans.join("");
  g.title = tips.join("\n");
}

// ---------- the tarmac (the square apron; everything scales with --S) ----------
let dragState = null;
const DISC = 0.125;            // disc side as a fraction of the apron side
function renderTarmac(){
  $("back").style.display = "none";
  $("hdr-title").textContent = "✈ airport";
  const hh = hosts(), up = Object.keys(hh).filter(hostUp);
  $("hdr-sub").textContent = up.length ? "airfields up: " + up.join(", ") : "no ground crew online";
  composer.classList.remove("on");
  feedEl.classList.remove("on");
  colsEl.classList.remove("on");
  $("laybtn").style.display = "none";
  tarmacEl.classList.add("on");
  const apron = $("apron");
  // the apron is a SQUARE — biggest that fits, centered; positions AND sizes are
  // fractions of the square, so the field looks the same on phone and desktop
  const W = tarmacEl.clientWidth, H = tarmacEl.clientHeight;
  const S = Math.max(200, Math.min(W, H) - 10);
  apron.style.width = apron.style.height = S + "px";
  apron.style.left = ((W - S) / 2) + "px";
  apron.style.top = ((H - S) / 2) + "px";
  apron.style.setProperty("--S", S + "px");
  const ss = sessions();
  const ids = Object.keys(ss);
  $("emptytarmac").style.display = ids.length ? "none" : "flex";
  const seen = new Set();
  for (const id of ids) {
    const s = ss[id];
    if (!s) continue;
    seen.add(id);
    let el = apron.querySelector(`.plane[data-id="${CSS.escape(id)}"]`);
    if (!el) {
      el = document.createElement("div");
      el.className = "plane";
      el.dataset.id = id;
      wirePlane(el);
      apron.appendChild(el);
    }
    el.classList.toggle("running", !!s.running);
    el.classList.toggle("hot", !s.running && isHot(s));
    el.classList.toggle("offline", s.state === "offline");
    if (dragState?.id !== id) {
      const x = clampX(typeof s.x === "number" ? s.x : 0.5);
      const y = clampY(typeof s.y === "number" ? s.y : 0.5);
      el.style.left = (x * S) + "px";                 // disc CENTER x (translateX(-50%))
      el.style.top = ((y - DISC / 2) * S) + "px";     // disc center y
      const off = !hostUp(s.host);
      const meta = s.running
        ? `<span class="runm">flying·${ago(s.startedAt)}</span>`
        : isHot(s) ? `<span class="hotm">hot·${ago(s.lastRunEndedAt)}</span>`
        : (s.lastRunEndedAt ? ago(s.lastRunEndedAt) : "new");
      el.innerHTML = `
        <div class="disc">${esc(emojiFor(id, s))}${isUnread(s) ? '<div class="unread"></div>' : ""}</div>
        <div class="name">${esc(s.title || id)}</div>
        <div class="meta"><span class="hostm${off ? " off" : ""}">${esc(s.host || "?")}</span> · ${fmtTok(s.totalTokens)} · ${meta}</div>`;
    }
  }
  for (const el of [...apron.querySelectorAll(".plane")]) if (!seen.has(el.dataset.id)) el.remove();
}
function clampX(x){ return Math.max(DISC/2 + 0.015, Math.min(1 - DISC/2 - 0.015, x)); }
function clampY(y){ return Math.max(DISC/2 + 0.015, Math.min(1 - DISC/2 - 0.055, y)); } // room for the name below
function wirePlane(el){
  el.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    dragState = { el, id: el.dataset.id, sx: e.clientX, sy: e.clientY,
                  ox: parseFloat(el.style.left), oy: parseFloat(el.style.top), moved: false };
  });
  el.addEventListener("pointermove", (e) => {
    if (!dragState || dragState.el !== el) return;
    const dx = e.clientX - dragState.sx, dy = e.clientY - dragState.sy;
    if (!dragState.moved && Math.hypot(dx, dy) < 8) return;
    dragState.moved = true;
    el.classList.add("dragging");
    const S = $("apron").clientWidth;
    el.style.left = (clampX((dragState.ox + dx) / S) * S) + "px";
    el.style.top = ((clampY((dragState.oy + dy) / S + DISC / 2) - DISC / 2) * S) + "px";
  });
  el.addEventListener("pointerup", () => {
    if (!dragState || dragState.el !== el) return;
    const d = dragState; dragState = null;
    el.classList.remove("dragging");
    if (d.moved) {
      const S = $("apron").clientWidth;
      patch({ sessions: { [d.id]: {
        x: clampX(parseFloat(el.style.left) / S),
        y: clampY(parseFloat(el.style.top) / S + DISC / 2) } } });
    } else openSession(d.id);
  });
  el.addEventListener("pointercancel", () => { if (dragState?.el === el) { el.classList.remove("dragging"); dragState = null; } });
}

// ---------- create session (pure data — a session is born as a patch) ----------
function hostOptions(sel){
  const hh = hosts();
  const names = Object.keys(hh).sort();
  if (!names.length) return `<option value="">no airfields yet — start a daemon</option>`;
  return names.map(n => `<option value="${esc(n)}"${n === sel ? " selected" : ""}>${esc(n)} — ${hostUp(n) ? "online" : "offline"}</option>`).join("");
}
$("addplane").addEventListener("click", (e) => {
  e.stopPropagation();
  const hh = hosts();
  sheet(`
    <h3>new session</h3>
    <label>name</label><input id="f-name" placeholder="e.g. lead-audit" autocomplete="off">
    <label>airfield (machine)</label><select id="f-host">${hostOptions(Object.keys(hh).find(hostUp) || "")}</select>
    <label>cwd (working directory)</label><input id="f-cwd" placeholder="" autocomplete="off">
    <label>model</label>
    <select id="f-model">${MODELS.map(m => `<option value="${m}">${m.replace("claude-","")}</option>`).join("")}</select>
    <div class="btns"><button data-x>cancel</button><button class="go" id="f-go">roll out 🛩</button></div>
    <div class="hint" id="f-err"></div>`,
  (ov) => {
    const cwdHint = () => {
      const h = hh[ov.querySelector("#f-host").value];
      ov.querySelector("#f-cwd").placeholder = h && h.sessRoot ? h.sessRoot + "/<name>" : "~/airport-sessions/<name>";
      ov.querySelector("#f-err").textContent = h && h.roots ? "allowed roots: " + h.roots.join(" · ") : "";
    };
    cwdHint();
    ov.querySelector("#f-host").addEventListener("change", cwdHint);
    ov.querySelector("#f-go").addEventListener("click", () => {
      const name = ov.querySelector("#f-name").value.trim();
      const id = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 40);
      if (!/^[a-z0-9][a-z0-9-]{0,40}$/.test(id)) { ov.querySelector("#f-err").textContent = "name needs letters/numbers"; return; }
      if (sessions()[id]) { ov.querySelector("#f-err").textContent = "taken"; return; }
      const host = ov.querySelector("#f-host").value;
      if (!host) { ov.querySelector("#f-err").textContent = "no airfield — start a daemon first"; return; }
      const h = hh[host];
      const cwd = ov.querySelector("#f-cwd").value.trim() || ((h && h.sessRoot ? h.sessRoot : "~/airport-sessions") + "/" + id);
      patch({ sessions: { [id]: {
        title: name, emoji: PLANES[Math.floor(Math.random() * PLANES.length)],
        host, cwd, model: ov.querySelector("#f-model").value,
        x: Math.random()*0.7 + 0.15, y: Math.random()*0.6 + 0.15,
        createdAt: Date.now(), state: "ready", messages: {},
      } } });
      ov.remove();
      openSession(id);
    });
  });
});

// ---------- sheets ----------
function sheet(html, wire){
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="sheet">${html}</div>`;
  ov.addEventListener("click", (e) => { if (e.target === ov) ov.remove(); });
  ov.querySelectorAll("[data-x]").forEach(b => b.addEventListener("click", () => ov.remove()));
  document.body.appendChild(ov);
  if (wire) wire(ov);
  return ov;
}
function serverSheet(){
  const hh = hosts();
  const hostRows = Object.keys(hh).sort().map((n) => {
    const h = hh[n] || {};
    return `<div class="hostrow"><span>${esc(n)}${h.online ? "" : ' <span class="off">(offline)</span>'}</span>
      <input type="number" min="1" max="16" data-cap="${esc(n)}" value="${h.turnCap ?? h.maxTurns ?? 2}"></div>`;
  }).join("");
  sheet(`
    <h3>tower</h3>
    <label>tower url</label><input id="f-url" value="${esc(BASE)}" placeholder="https://tower.example:7800" autocomplete="off">

  cfg.querySelector("#c-del").addEventListener("click", (e) => {

const CFG_CHECKS = [

// ---------- session view ----------
const FMTS = ["txt", "md", "html"];
function guessFmt(t){
  if (!t) return "txt";
  const head = t.trimStart().slice(0, 200).toLowerCase();
  if (/^<!doctype html|^<html[\s>]|^<svg[\s>]/.test(head)) return "html";
  if ((t.match(/<\/?(div|p|table|tr|td|span|h[1-6]|ul|ol|li|body|head|style|script|svg|img|a)\b/gi) || []).length >= 4) return "html";
  if (/(^|\n)#{1,4} \S|\*\*[^*\n]+\*\*|```|(^|\n)([-*] .+\n){2}|(^|\n)\d+\. .+\n\d+\. |\[[^\]\n]+\]\(https?:[^)\s]+\)|(^|\n)\|.+\|\s*\n\s*\|[-| :]+\|/.test(t)) return "md";
  return "txt";
}
function mdInline(s){
  return s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s.,;:!?)]|$)/g, "$1<i>$2</i>")
    .replace(/\[([^\]\n]+)\]\((https?:[^)\s]+)\)/g, `<a href="$2" target="_blank" rel="noopener">$1</a>`)
    .replace(/(^|\s)(https?:\/\/[^\s<&]+[^\s<&.,;:!?)])/g, `$1<a href="$2" target="_blank" rel="noopener">$2</a>`);
}
function mdHtml(src){
  const codes = [];
  src = String(src).replace(/```(\w*)\n?([\s\S]*?)(```|$)/g, (_, lang, body) => {
    codes.push(`<pre><code>${esc(body.replace(/\n$/, ""))}</code></pre>`);
    return "\x00" + (codes.length - 1) + "\x00";
  });
  const lines = esc(src).split("\n");
  const out = [];
  let para = [], list = null, quote = [], table = [];
  const flushP = () => { if (para.length) { out.push(`<p>${para.map(mdInline).join("<br>")}</p>`); para = []; } };
  const flushL = () => { if (list) { out.push(`<${list.tag}>` + list.items.map(i => `<li>${mdInline(i)}</li>`).join("") + `</${list.tag}>`); list = null; } };
  const flushQ = () => { if (quote.length) { out.push(`<blockquote>${quote.map(mdInline).join("<br>")}</blockquote>`); quote = []; } };
  const flushT = () => {
    if (table.length < 2) { para.push(...table); table = []; return; }
    const cells = (r) => r.replace(/^\s*\||\|\s*$/g, "").split("|").map(c => mdInline(c.trim()));
    let h = `<table><tr>${cells(table[0]).map(c => `<th>${c}</th>`).join("")}</tr>`;
    for (const r of table.slice(2)) h += `<tr>${cells(r).map(c => `<td>${c}</td>`).join("")}</tr>`;
    out.push(h + "</table>"); table = [];
  };
  const flushAll = () => { flushP(); flushL(); flushQ(); flushT(); };
  for (const ln of lines) {
    let m;
    if (/^\x00\d+\x00\s*$/.test(ln)) { flushAll(); out.push(ln.trim()); continue; }
    if (/^\s*$/.test(ln)) { flushAll(); continue; }
    if ((m = ln.match(/^(#{1,6}) +(.+)/))) { flushAll(); const n = Math.min(m[1].length, 4); out.push(`<h${n}>${mdInline(m[2])}</h${n}>`); continue; }
    if (/^ {0,3}(---+|\*\*\*+)\s*$/.test(ln)) { flushAll(); out.push("<hr>"); continue; }
    if ((m = ln.match(/^ {0,3}&gt; ?(.*)/))) { flushP(); flushL(); flushT(); quote.push(m[1]); continue; }
    if (/^\s*\|.*\|\s*$/.test(ln)) { flushP(); flushL(); flushQ(); table.push(ln); continue; }
    if ((m = ln.match(/^\s*[-*+] +(.+)/))) { flushP(); flushQ(); flushT(); if (!list || list.tag !== "ul") { flushL(); list = { tag:"ul", items:[] }; } list.items.push(m[1]); continue; }
    if ((m = ln.match(/^\s*\d+[.)] +(.+)/))) { flushP(); flushQ(); flushT(); if (!list || list.tag !== "ol") { flushL(); list = { tag:"ol", items:[] }; } list.items.push(m[1]); continue; }
    flushL(); flushQ(); flushT(); para.push(ln);
  }
  flushAll();
  return out.join("").replace(/\x00(\d+)\x00/g, (_, i) => codes[+i]);
}

const WHO = { user: "you", ai: "claude", tool: "tool" };
const collapseOverride = {};  // `${session}:${key}` -> user-toggled collapse (wins over the auto rule)
const RECENT_OPEN = 6;        // boxes at the tail that start expanded; everything older chips
function boxCollapsed(b, i, len){
  const isBottom = i === len - 1;
  const auto = (b.role === "tool" && !isBottom) || i < len - RECENT_OPEN;
  return editing !== b.key && (collapseOverride[view + ":" + b.key] ?? auto);
}
function chipLabel(b){
  const fl = (b.text || "").trim().split("\n")[0];
  if (b.role !== "tool") return (WHO[b.role] || b.role) + " · " + fl.slice(0, 18);
  let m;
  if (b.err || /^✗/.test(fl)) return "✗ " + (fl.replace(/^✗\s*/, "").slice(0, 15) || "error");
  if ((m = fl.match(/^▸ (\S+)/))) return "▸ " + m[1];
  if (/^[◼⟲🛬]/.test(fl)) return fl.slice(0, 18);
  return "→ " + fl.slice(0, 15);  // tool result
}
function turnHtml(b, i, len){
  const cls = b.err ? b.role + " err" : b.role;
  const cls2 = b.role === "user" ? "you" : b.role;
  if (boxCollapsed(b, i, len))
    return `<div class="chip ${cls}" data-tgl="${b.key}" title="${esc((b.text || "").slice(0, 300)).replace(/"/g, "&quot;")}">${esc(chipLabel(b))}</div>`;
  const forced = fmtOverride[view + ":" + b.key];
  const fmt = forced || (b.role === "tool" ? "txt" : guessFmt(b.text || ""));
  let body;
  if (editing === b.key) {
    body = `<textarea class="editbox" id="edit-${b.key}">${esc(b.text || "")}</textarea>
      <div class="confirmrow">
        <button class="bbtn" data-esave="${b.key}">save</button>
        <button class="bbtn" data-ecancel="1">cancel</button>
      </div>`;
  } else if (fmt === "html") body = `<div class="text"><iframe class="htmlframe" sandbox="allow-scripts" data-key="${b.key}"></iframe></div>`;
  else if (fmt === "md") body = `<div class="text md">${mdHtml(b.text || "")}</div>`;
  else body = `<div class="text">${esc(b.text || "")}</div>`;
  const st = b.stats;
  const statline = st ? `<div class="statline">
      <span>${fmtDur(st.ms)}</span><span>out ${fmtTok(st.out)}</span>
      <span class="cr">read ${fmtTok(st.cread)}</span><span class="cw">write ${fmtTok(st.cwrite)}</span>
      <span>~$${Number(st.cost).toFixed(4)}</span></div>` : "";
  const del = confirming === b.key ? `
      <button class="bbtn danger" data-del="${b.key}">this box</button>
      <button class="bbtn danger" data-delbelow="${b.key}">＋ below</button>
      <button class="bbtn" data-ecancel="1">×</button>` : `
      <button class="bbtn" data-confirm="${b.key}">✕</button>`;
  return `
  <div class="turn ${cls2}${b.err ? " err" : ""}">
    <div class="row1">
      <span class="who" data-tgl="${b.key}">${WHO[b.role] || b.role}${b.synced ? "" : " ·pending"}</span>
      <span class="when" data-tgl="${b.key}">${fmtT(b.ts)}</span>
      <span class="grow"></span>
      <button class="bbtn${forced ? " forced" : ""}" data-fmt="${b.key}">${fmt}</button>
      <button class="bbtn" data-edit="${b.key}">✎</button>
      ${del}
    </div>
    ${body}${statline}
  </div>`;
}

function renderSession(){
  const s = sess(view);
  if (!s || !Object.keys(s).length) { view = null; return renderTarmac(); }
  $("back").style.display = "block";
  $("hdr-title").textContent = (s.emoji || emojiFor(view, s)) + " " + (s.title || view);
  const hot = s.running ? "flying" : isHot(s) ? `hot ${ago(s.lastRunEndedAt)}` : "cold";
  const off = !hostUp(s.host);
  $("hdr-sub").textContent = `${s.host || "?"}${off ? "⚠" : ""} · ${s.cwd || "?"} · ${(s.model || "fable-5").replace("claude-","")} · ${hot} · ${fmtTok(s.totalTokens)} ctx${s.systemPrompt ? (s.systemMode === "replace" ? " · sys⇄" : " · sys+") : ""}${s.useClaudeMd ? " · 📋md" : ""}${s.useMemory === false ? " · mem✗" : ""}${s.useSkills === false ? " · skills✗" : ""}${s.dirty ? " · edited⟲" : ""}`;
  setStat(s.running ? "warn" : off ? "bad" : "ok", s.running ? "flying…" : off ? "airfield offline" : "live");
  tarmacEl.classList.remove("on");
  colsEl.classList.add("on");
  const wide = wideMode();
  colsEl.classList.toggle("wide", wide);
  const lb = $("laybtn");
  lb.style.display = "block";
  lb.textContent = wide ? "▭" : "▦";
  feedEl.classList.add("on");
  composer.classList.add("on");
  if (wide) {
    if (!exp[view]) { lastRunSeen[view] = s.lastRunEndedAt || 0; colsFor = view; renderExplorer(); renderFileView(); }
    else if (colsFor !== view) { colsFor = view; lastRunSeen[view] = s.lastRunEndedAt || 0; refreshFs(); }  // columns still show another plane
    else if (s.lastRunEndedAt && lastRunSeen[view] !== s.lastRunEndedAt) { lastRunSeen[view] = s.lastRunEndedAt; refreshFs(); }
  }
  const boxes = boxesOf(s);
  const nearBottom = feedEl.scrollHeight - feedEl.scrollTop - feedEl.clientHeight < 120;
  const msgs = ensureCfg();  // settings panel rides at the top of the same scroll
  syncCfg();                 // pull remote changes into non-focused fields
  msgs.innerHTML = (boxes.length ? boxes.map((b, i) => turnHtml(b, i, boxes.length)).join("") : `<div class="emptyfeed">empty hold — add a box below</div>`)
    + (s.running ? `<div class="thinking"><span></span><span></span><span></span></div>` : "");
  if (nearBottom) feedEl.scrollTop = feedEl.scrollHeight;

  feedEl.querySelectorAll(".htmlframe").forEach(f => {
    const b = (s.messages || {})[f.dataset.key];
    if (b) f.srcdoc = b.text || "";
  });
  feedEl.querySelectorAll("[data-tgl]").forEach(el => el.addEventListener("click", () => {
    const key = el.dataset.tgl, b = (s.messages || {})[key];
    if (!b) return;
    const idx = boxes.findIndex((x) => x.key === key);
    collapseOverride[view + ":" + key] = !boxCollapsed({ ...b, key }, idx, boxes.length);
    keepScroll(renderSession);
  }));
  feedEl.querySelectorAll("[data-fmt]").forEach(btn => btn.addEventListener("click", () => {
    const key = btn.dataset.fmt, b = (s.messages || {})[key];
    if (!b) return;
    const gk = view + ":" + key;
    const cur = fmtOverride[gk] || (b.role === "tool" ? "txt" : guessFmt(b.text || ""));
    const next = FMTS[(FMTS.indexOf(cur) + 1) % FMTS.length];
    if (next === guessFmt(b.text || "") && b.role !== "tool") delete fmtOverride[gk]; else fmtOverride[gk] = next;
    keepScroll(renderSession);
  }));
  feedEl.querySelectorAll("[data-edit]").forEach(btn => btn.addEventListener("click", () => {
    editing = btn.dataset.edit; confirming = null; keepScroll(renderSession);
  }));
  feedEl.querySelectorAll("[data-esave]").forEach(btn => btn.addEventListener("click", () => {
    const key = btn.dataset.esave;
    const text = $("edit-" + key).value;
    const b = (s.messages || {})[key];
    editing = null;
    const p = { messages: { [key]: { text } } };
    if (b && b.synced) p.dirty = true;
    patch({ sessions: { [view]: p } });
  }));
  feedEl.querySelectorAll("[data-ecancel]").forEach(btn => btn.addEventListener("click", () => {
    editing = null; confirming = null; keepScroll(renderSession);
  }));
  feedEl.querySelectorAll("[data-confirm]").forEach(btn => btn.addEventListener("click", () => {
    confirming = btn.dataset.confirm; editing = null; keepScroll(renderSession);
  }));
  feedEl.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", () => delBoxes([btn.dataset.del])));
  feedEl.querySelectorAll("[data-delbelow]").forEach(btn => btn.addEventListener("click", () => {
    const keys = boxesOf(s).map(b => b.key);
    delBoxes(keys.slice(keys.indexOf(btn.dataset.delbelow)));
  }));
  updateJumps();
}
function keepScroll(fn){ const t = feedEl.scrollTop; fn(); feedEl.scrollTop = t; }
function delBoxes(keys){
  const s = sess(view);
  confirming = null;
  const mp = {}, anySynced = keys.some(k => s.messages?.[k]?.synced);
  for (const k of keys) mp[k] = null;
  const p = { messages: mp };
  if (anySynced) p.dirty = true;
  patch({ sessions: { [view]: p } });
}

// Like a skill, but usable even when the session runs with skills/CLAUDE.md off,

function briefingText(id, s){

  return [
"✈ AIRPORT BRIEFING — how this session is being driven (context, not a task)",
"",
"You are session \"" + id + "\" in airport, Greg's claude-session manager (github.com/dglittle/airport).",
"",
"- Each of your turns is one `claude -p --resume` run, launched from a web UI (\"the tower\", " + (BASE || "the tower") + ") by a daemon on the machine \"" + (s.host || "?") + "\". Turn timeout: 10 minutes — for long work, save progress to files as you go.",
"- Your setup right now: cwd " + (s.cwd || "?") + " · model " + (s.model || "claude-fable-5") + " · context loading: CLAUDE.md " + onoff(!!s.useClaudeMd) + ", auto-memory " + onoff(s.useMemory !== false) + ", skills " + onoff(s.useSkills !== false) + ". Greg can change all of this (plus your system prompt, allowed tools, and even which machine you run on) from the UI.",

// ---------- composer: box + dictate + whisper ----------
const box = $("box"), interimEl = $("interim");
const dictateBtn = $("dictate"), whisperBtn = $("whisper");
const dm = $("dm"), dmFill = $("dm-fill"), dmKnob = $("dm-knob"), dmTxt = $("dm-txt");
const DEADMAN_SECS = 40, STOP_ZONE = 0.38;
function autoGrow(){ box.style.height = "auto"; box.style.height = Math.min(box.scrollHeight, window.innerHeight * 0.3) + "px"; }
// per-plane drafts: whatever sits in the composer is keyed by session id in
// localStorage, so switching planes or reloading brings each draft back
const LS_DRAFTS = "airportDrafts_v1";
function drafts(){ try { return JSON.parse(localStorage.getItem(LS_DRAFTS)) || {}; } catch (_) { return {}; } }
function saveDraft(){
  if (!view) return;
  const d = drafts();
  if (box.value) d[view] = box.value; else delete d[view];
  localStorage.setItem(LS_DRAFTS, JSON.stringify(d));
}
function loadDraft(id){ box.value = drafts()[id] || ""; autoGrow(); }
box.addEventListener("input", () => { autoGrow(); saveDraft(); });
function appendText(t){
  t = (t || "").trim();
  if (!t) return;
  const cur = box.value;
  box.value = cur + (cur && !/\s$/.test(cur) ? " " : "") + t;
  autoGrow(); saveDraft();
  box.scrollTop = box.scrollHeight;
}
let mode = null, deadline = 0, dmTimer = null;
function dmStart(label){
  deadline = Date.now() + DEADMAN_SECS * 1000;
  dm.classList.add("on");
  clearInterval(dmTimer);
  dmTimer = setInterval(() => {
    const left = deadline - Date.now();
    if (left <= 0) { stopMode("time ran out"); return; }
    const frac = Math.max(0, Math.min(1, left / (DEADMAN_SECS * 1000)));
    const w = dm.clientWidth - 14;
    dmKnob.style.left = (2 + frac * w) + "px";
    dmFill.style.width = (frac * 100) + "%";
    dmTxt.textContent = label + " · " + Math.ceil(left / 1000) + "s";
  }, 180);
}
function dmStop(){ clearInterval(dmTimer); dmTimer = null; dm.classList.remove("on"); }
dm.addEventListener("pointerdown", (e) => {
  const x = (e.clientX - dm.getBoundingClientRect().left) / dm.clientWidth;
  if (x < STOP_ZONE) stopMode("stopped");
  else deadline = Date.now() + DEADMAN_SECS * 1000;
});
function stopMode(why){
  if (!mode) return;
  const m = mode; mode = null;
  dmStop();
  if (m === "dictate") stopDictation(why);
  if (m === "whisper") stopWhisper(why);
}
function stopModeSafe(){ try { stopMode("left session"); } catch (_) {} }

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, recArmed = false;
if (!SR) { dictateBtn.disabled = true; dictateBtn.textContent = "📱 n/a"; }
function startDictation(){
  recArmed = true;
  rec = new SR();
  rec.lang = navigator.language || "en-US";
  rec.continuous = true;
  rec.interimResults = true;
  rec.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const r = e.results[i];
      if (r.isFinal) appendText(r[0].transcript);
      else interim += r[0].transcript;
    }
    interimEl.textContent = interim;
  };
  rec.onerror = (e) => {
    hint("dictation error [" + (e.error || "unknown") + "]" + (e.error === "service-not-allowed" ? " — enable iOS dictation" : ""));
    if (mode === "dictate") { recArmed = false; stopMode("error"); }
  };
  rec.onend = () => {
    if (recArmed && mode === "dictate" && Date.now() < deadline) {
      try { rec.start(); return; } catch (_) {}
    }
    interimEl.textContent = "";
    if (mode === "dictate") stopMode("ended");
  };
  try { rec.start(); } catch (e) { hint("dictation failed: " + e.message); recArmed = false; return; }
  mode = "dictate";
  dictateBtn.classList.add("on"); dictateBtn.textContent = "📱 listening…";
  hint("dictating (slider-left or button to stop)");
  dmStart("dictating");
}
function stopDictation(why){
  recArmed = false;
  try { rec && rec.stop(); } catch (_) {}
  interimEl.textContent = "";
  dictateBtn.classList.remove("on"); dictateBtn.textContent = "📱 dictate";
  hint("dictation " + why);
}

let mediaStream = null, recorder = null, chunks = [], mimeType = "";
async function startWhisper(){
  try { mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:true, noiseSuppression:true } }); }
  catch (e) { hint("mic permission denied: " + e.message); return; }
  const candidates = ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];
  mimeType = candidates.find(t => window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) || "";
  try { recorder = mimeType ? new MediaRecorder(mediaStream, {mimeType}) : new MediaRecorder(mediaStream); }
  catch (e) { hint("MediaRecorder unsupported: " + e.message); mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; return; }
  chunks = [];
  recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
  recorder.onstop = onWhisperStop;
  recorder.start();
  mode = "whisper";
  whisperBtn.classList.add("on"); whisperBtn.textContent = "☁︎ recording…";
  hint("recording for whisper (slider-left or button to finish)");
  dmStart("whisper rec");
}
function stopWhisper(_why){
  try { recorder && recorder.stop(); } catch (_) {}
  whisperBtn.classList.remove("on");
}
async function onWhisperStop(){
  (mediaStream ? mediaStream.getTracks() : []).forEach(t => t.stop()); mediaStream = null;
  const r = recorder; recorder = null;
  if (!chunks.length) { whisperBtn.textContent = "☁︎ whisper"; hint("nothing recorded"); return; }
  const blob = new Blob(chunks, {type: r.mimeType || mimeType || "audio/webm"});
  whisperBtn.classList.add("busy"); whisperBtn.textContent = "☁︎ transcribing…";
  try {
    const resp = await fetch(BASE + "/whisper?pass=" + encodeURIComponent(localStorage.getItem(LS_PASS) || ""),
      { method:"POST", headers:{"Content-Type": blob.type || "audio/webm"}, body: blob });
    const j = await resp.json().catch(() => ({}));
    if (!resp.ok || !j.ok) hint("whisper failed: " + (j.error || resp.status));
    else { appendText(j.text); hint("whisper: +" + (j.text||"").length + " chars — edit, then ＋ or ⚡"); }
  } catch (e) { hint("whisper failed: " + e.message); }
  whisperBtn.classList.remove("busy"); whisperBtn.textContent = "☁︎ whisper";
}
dictateBtn.addEventListener("click", () => {
  if (mode === "dictate") { stopMode("stopped"); return; }
  if (mode) stopMode("switched");
  startDictation();
});
whisperBtn.addEventListener("click", () => {
  if (mode === "whisper") { stopMode("stopped"); return; }
  if (mode) stopMode("switched");
  startWhisper();
});
box.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !("ontouchstart" in window)) { e.preventDefault(); $("runbtn").click(); }
});

const LS_LAYOUT = "airportLayout_v1";
let layoutOverride = localStorage.getItem(LS_LAYOUT) || null; // "wide" | "narrow" | null = auto by aspect
function wideMode(){ return (layoutOverride || (innerWidth > innerHeight ? "wide" : "narrow")) === "wide"; }

// ---------- jump arrows: hover when the feed is scrolled away ----------
const jumpTop = $("jumptop"), jumpBot = $("jumpbot"), foldBtn = $("fold");
const feedAtBottom = () => feedEl.scrollHeight - feedEl.scrollTop - feedEl.clientHeight < 80;
function anyBoxOpen(){
  const boxes = boxesOf(sess(view));
  return boxes.some((b, i) => editing !== b.key && !boxCollapsed(b, i, boxes.length));
}
function updateJumps(){

foldBtn.addEventListener("click", () => {

// ---------- explorer + file view (rooted at the session's cwd, via the tower relay) ----------
const exp = {};          // session id -> { cache:{rel:[entries]}, open:Set, sel, selData, fvfmt, editing }
const lastRunSeen = {};  // session id -> lastRunEndedAt already reflected in the explorer
let colsFor = null;      // which plane the explorer/file columns currently render
function expState(){ return exp[view] || (exp[view] = { cache: {}, open: new Set(), sel: null, selData: null, fvfmt: null, editing: false }); }
function fmtSize(n){ if (n == null) return ""; if (n >= 1e6) return (n/1e6).toFixed(1)+"M"; if (n >= 1e3) return Math.round(n/1e3)+"k"; return n+"b"; }
function fsRaw(op, rel, extra){
  return new Promise((resolve) => {
    const reqId = Math.random().toString(36).slice(2, 10);
    fsReqs.set(reqId, resolve);
    send(Object.assign({ type: "fs", reqId, session: view, op, rel }, extra || {}));
    setTimeout(() => { if (fsReqs.has(reqId)) { fsReqs.delete(reqId); resolve({ ok: false, error: "timeout" }); } }, 25000);
  });
}
async function fsFetch(kind, rel){ return fsRaw(kind, rel); }
async function fsSave(rel, text, ifAbsent){ return fsRaw("write", rel, { text, ifAbsent: !!ifAbsent }); }
async function loadDir(rel){
  const st = expState();
  if (st.cache[rel] === "loading") return;
  st.cache[rel] = "loading";
  try { const j = await fsFetch("list", rel); st.cache[rel] = j.ok ? j.entries : []; }
  catch (_) { st.cache[rel] = []; }
  renderExplorer();
}
function renderExplorer(){
  if (!view || !wideMode()) return;
  const st = expState(), s = sess(view);
  let html = `<div class="exphead"><span>${esc((s.cwd || "hangar").split("/").pop())}</span><button id="expnew" title="new file">＋</button><button id="expref" title="refresh">↻</button></div>`;
  const walk = (rel, depth) => {
    const entries = st.cache[rel];
    if (!entries || entries === "loading") { html += `<div class="expempty" style="padding-left:${8 + depth * 14}px">…</div>`; if (!entries) loadDir(rel); return; }
    if (!entries.length && depth === 0) { html += `<div class="expempty">empty hangar — claude can put files here</div>`; return; }
    for (const e of entries) {
      const erel = rel ? rel + "/" + e.name : e.name;
      if (e.dir) {
        const open = st.open.has(erel);
        html += `<div class="fent dir" data-dir="${esc(erel)}" style="padding-left:${6 + depth * 14}px"><span class="arrow">${open ? "▾" : "▸"}</span><span class="fname">${esc(e.name)}</span></div>`;
        if (open) walk(erel, depth + 1);
      } else {
        html += `<div class="fent${st.sel === erel ? " sel" : ""}" data-file="${esc(erel)}" style="padding-left:${6 + depth * 14}px"><span class="arrow"></span><span class="fname">${esc(e.name)}</span><span class="fsize">${fmtSize(e.size)}</span></div>`;
      }
    }
  };
  walk("", 0);
  const ex = $("explorer");
  ex.innerHTML = html;
  ex.querySelectorAll("[data-dir]").forEach(el => el.addEventListener("click", () => {
    const rel = el.dataset.dir;
    st.open.has(rel) ? st.open.delete(rel) : st.open.add(rel);
    renderExplorer();
  }));
  ex.querySelectorAll("[data-file]").forEach(el => el.addEventListener("click", () => openFile(el.dataset.file)));
  const rb = ex.querySelector("#expref");
  if (rb) rb.addEventListener("click", () => refreshFs());
  const nb = ex.querySelector("#expnew");
  if (nb) nb.addEventListener("click", newFile);
}
async function openFile(rel, edit){
  const st = expState();
  if (rel !== st.sel && !closeEditor()) return;   // unsaved edit — user chose to keep it
  if (edit) st.editing = true;
  placePut(p => { (p.files = p.files || {})[view] = rel; (p.edits = p.edits || {})[view] = !!st.editing; });
  st.sel = rel; st.selData = null; st.fvfmt = null;
  if (!wideMode()) colsFor = null;  // columns not rendered now — rebuild on next wide entry
  renderExplorer(); renderFileView();
  try { st.selData = await fsFetch("read", rel); } catch (e) { st.selData = { ok: false, error: e.message }; }
  renderFileView();
}
async function newFile(){
  const rel = (window.prompt("new file (path relative to the hangar):") || "").trim().replace(/^\/+/, "");
  if (!rel) return;
  const r = await fsSave(rel, "", true);
  if (!r.ok) { hint("create failed: " + (r.error || "?")); return; }
  const st = expState();
  st.cache = {};
  const parts = rel.split("/"); parts.pop();          // open the folders on the way down
  let p = ""; for (const seg of parts) { p = p ? p + "/" + seg : seg; st.open.add(p); }
  renderExplorer();
  openFile(rel, true);
}
function fileFmt(rel){
  const ext = (rel.split(".").pop() || "").toLowerCase();
  if (["png","jpg","jpeg","gif","webp","svg","ico"].includes(ext)) return "img";
  if (["html","htm"].includes(ext)) return "html";
  if (ext === "md") return "md";
  return "txt";
}
function renderFileView(){
  if (!view || !wideMode()) return;
  const st = expState(), fv = $("fileview");
  if (fvEd && !st.editing) destroyEditor();  // stale editor after a plane switch
  if (!st.sel) { fv.innerHTML = `<div class="fvnote">pick a file on the left — it shows here</div>`; return; }
  const d = st.selData;
  if (st.editing && d) {
    if (!d.ok || d.binary || d.truncated) {
      st.editing = false;
      hint(!d.ok ? "read failed — can't edit" : d.binary ? "binary — can't edit" : "truncated at 512k — edit disabled");
    } else return renderEditor(fv, st, d);
  }
  const auto = fileFmt(st.sel);
  const fmt = st.fvfmt || auto;
  let body;
  if (!d) body = `<div class="fvnote">loading…</div>`;
  else if (!d.ok) body = `<div class="fvnote">✗ ${esc(d.error || "read failed")}</div>`;
  else if (fmt === "img") body = d.b64 ? `<img class="fvimg" src="data:${esc(d.mime || "image/png")};base64,${d.b64}">` : `<div class="fvnote">image too large to preview · ${fmtSize(d.size)}</div>`;
  else if (d.binary) body = `<div class="fvnote">binary · ${fmtSize(d.size)}</div>`;
  else if (fmt === "html") body = `<iframe class="fvframe" sandbox="allow-scripts"></iframe>`;
  else if (fmt === "md") body = `<div class="text md">${mdHtml(d.text || "")}</div>`;
  else body = `<pre class="fvpre">${esc(d.text || "")}</pre>` + (d.truncated ? `<div class="fvnote">truncated at 512k of ${fmtSize(d.size)}</div>` : "");
  fv.innerHTML = `
    <div class="fvhead"><span class="fvpath">${esc(st.sel)}</span><span class="fvsize">${d && d.size != null ? fmtSize(d.size) : ""}</span>
      ${auto === "img" ? "" : `<button id="fvfmt">${fmt}</button>`}${d && d.ok && !d.binary && auto !== "img" ? `<button id="fvedit" title="edit">✎</button>` : ""}<button id="fvref" title="reload">↻</button></div>
    <div class="fvbody">${body}</div>`;
  const fr = fv.querySelector(".fvframe");
  if (fr) fr.srcdoc = d.text || "";
  const fb = fv.querySelector("#fvfmt");
  if (fb) fb.addEventListener("click", () => {
    const cyc = ["txt","md","html"];
    st.fvfmt = cyc[(cyc.indexOf(fmt) + 1) % cyc.length];
    renderFileView();
  });
  const eb = fv.querySelector("#fvedit");
  if (eb) eb.addEventListener("click", () => { st.editing = true; placePut(p => { (p.edits = p.edits || {})[view] = true; }); renderFileView(); });
  fv.querySelector("#fvref").addEventListener("click", () => openFile(st.sel));
}

// ---------- monaco file editing (lazy-loaded from CDN on first ✎) ----------
const MONACO_CDN = "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min";
let monacoP = null, fvEd = null, fvSavedVer = -1;
// unsaved-edit drafts, like composer drafts: `${plane}:${rel}` -> text, restored on next ✎
const LS_FDRAFTS = "airportFileDrafts_v1";
let fdraftTimer = null;
function fdrafts(){ try { return JSON.parse(localStorage.getItem(LS_FDRAFTS)) || {}; } catch (_) { return {}; } }
function fdraftPut(k, text){
  const d = fdrafts();
  if (text == null) delete d[k]; else d[k] = text;
  try { localStorage.setItem(LS_FDRAFTS, JSON.stringify(d)); } catch (_) {}  // quota blown — draft just won't survive reload
}
function loadMonaco(){
  if (monacoP) return monacoP;
  // cross-origin worker shim — the documented recipe for CDN-hosted monaco
  window.MonacoEnvironment = { getWorkerUrl: () => URL.createObjectURL(new Blob(
    [`self.MonacoEnvironment={baseUrl:'${MONACO_CDN}/'};importScripts('${MONACO_CDN}/vs/base/worker/workerMain.js');`],
    { type: "text/javascript" })) };
  monacoP = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = MONACO_CDN + "/vs/loader.js";
    s.onload = () => {
      require.config({ paths: { vs: MONACO_CDN + "/vs" } });
      require(["vs/editor/editor.main"], () => resolve(window.monaco), reject);
    };
    s.onerror = () => { monacoP = null; reject(new Error("monaco cdn unreachable")); };
    document.head.appendChild(s);
  });
  return monacoP;
}
function fvDirty(){ return !!(fvEd && fvEd.getModel() && fvEd.getModel().getAlternativeVersionId() !== fvSavedVer); }
function destroyEditor(){ if (!fvEd) return; clearTimeout(fdraftTimer); const m = fvEd.getModel(); fvEd.dispose(); if (m) m.dispose(); fvEd = null; }
function closeEditor(force){  // true = closed; false = user kept unsaved changes
  const st = expState();
  if (!st.editing) return true;
  if (!force && fvDirty() && !confirm("discard unsaved changes?")) return false;
  st.editing = false;
  placePut(p => { (p.edits = p.edits || {})[view] = false; });
  fdraftPut(view + ":" + st.sel, null);  // discard chosen (or clean) — the draft dies with the editor
  destroyEditor();
  return true;
}
function renderEditor(fv, st, d){
  fv.innerHTML = `
    <div class="fvhead"><span class="fvpath">✎ ${esc(st.sel)}</span><span class="fvsize" id="fvdirty"></span>
      <button id="fvsave">save</button><button id="fvdone">done</button></div>
    <div class="fvbody fvedit"><div class="fveditor" id="fveditor">loading monaco…</div></div>`;
  fv.querySelector("#fvsave").addEventListener("click", saveFile);
  fv.querySelector("#fvdone").addEventListener("click", () => { if (closeEditor()) renderFileView(); });
  mountEditor(st.sel, d.text || "");
}
async function mountEditor(rel, text){
  let monaco;
  try { monaco = await loadMonaco(); }
  catch (e) { const el = $("fveditor"); if (el) el.textContent = "✗ " + e.message; return; }
  const el = $("fveditor");
  if (!el || !expState().editing || expState().sel !== rel) return;  // user moved on while loading
  destroyEditor();
  el.textContent = "";
  const uri = monaco.Uri.file("/" + view + "/" + rel);
  const old = monaco.editor.getModel(uri); if (old) old.dispose();
  const model = monaco.editor.createModel(text, undefined, uri);  // language from extension
  fvEd = monaco.editor.create(el, { model, theme: "vs-dark", automaticLayout: true,
    minimap: { enabled: false }, fontSize: 12, tabSize: 2, scrollBeyondLastLine: false, wordWrap: "on" });
  fvSavedVer = model.getAlternativeVersionId();
  const dk = view + ":" + rel;
  const draft = fdrafts()[dk];
  if (draft != null && draft !== text) { model.setValue(draft); hint("restored your unsaved edit (draft)"); }
  else if (draft === text) fdraftPut(dk, null);  // stale draft, already on disk
  fvEd.onDidChangeModelContent(() => {
    syncDirtyUi();
    clearTimeout(fdraftTimer);
    fdraftTimer = setTimeout(() => { if (fvEd) fdraftPut(dk, fvDirty() ? fvEd.getValue() : null); }, 400);
  });
  fvEd.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, saveFile);
  syncDirtyUi();
}
function syncDirtyUi(){
  const dirty = fvDirty();
  const sb = document.querySelector("#fvsave"), dt = document.querySelector("#fvdirty");
  if (sb) sb.classList.toggle("dirty", dirty);
  if (dt) dt.textContent = dirty ? "●" : "";
}
async function saveFile(){
  const st = expState();
  if (!fvEd || !st.editing) return;
  const text = fvEd.getValue();
  const r = await fsSave(st.sel, text, false);
  if (!r.ok) { hint("save failed: " + (r.error || "?")); return; }
  fvSavedVer = fvEd.getModel().getAlternativeVersionId();
  fdraftPut(view + ":" + st.sel, null);
  st.selData = { ok: true, text, size: r.size };
  syncDirtyUi();
  hint("saved " + st.sel);
  const parent = st.sel.includes("/") ? st.sel.slice(0, st.sel.lastIndexOf("/")) : "";
  delete st.cache[parent]; renderExplorer();  // refresh the size in the tree
}

function refreshFs(){  // after a run or plane switch: relist everything open, reload the open file
  if (!view || !wideMode()) return;
  const st = expState();
  st.cache = {};
  renderExplorer();
  if (st.editing) return;                 // never clobber an open editor
  if (st.sel) openFile(st.sel);
  else renderFileView();                  // no file here — clear another plane's leftovers
}

// ---------- boot ----------
window.addEventListener("resize", () => { if (view) render(); else if (doc[0]) renderTarmac(); });
if (BASE) connect(); else serverSheet();
</script>
